<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager — farouqhassan.dev</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms-app@3.1.10/dist/decap-cms-app.js"></script>
    <script>
      // If token is in hash, store it and clean URL
      var hash = window.location.hash.substring(1);
      var params = {};
      hash.split('&').forEach(function(part) {
        var item = part.split('=');
        if (item[0]) params[decodeURIComponent(item[0])] = decodeURIComponent(item[1] || '');
      });

      if (params.access_token) {
        localStorage.setItem('decap-cms-user', JSON.stringify({
          token: params.access_token,
          provider: 'github'
        }));
        history.replaceState(null, '', window.location.pathname);
      }

      // Override window.open to redirect in same tab instead of popup
      var originalOpen = window.open;
      window.open = function(url, name, features) {
        if (url && url.indexOf('api/auth') !== -1) {
          window.location.href = url;
          return window;
        }
        return originalOpen.call(window, url, name, features);
      };

      DecapCmsApp.init();
    </script>
  </body>
</html>
