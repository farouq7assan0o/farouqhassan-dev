<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager — farouqhassan.dev</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms-app@3.1.10/dist/decap-cms-app.js"></script>
    <script>
      // Parse token from hash in any format: #access_token= or #/access_token=
      var hash = window.location.hash.replace(/^#\/?/, '');
      var params = new URLSearchParams(hash);
      var token = params.get('access_token');

      if (token) {
        localStorage.setItem('decap-cms-user', JSON.stringify({
          token: token,
          provider: 'github'
        }));
        history.replaceState(null, '', window.location.pathname);
        window.location.reload();
        return;
      }

      // Also check query string
      var qtoken = new URLSearchParams(window.location.search).get('token');
      if (qtoken) {
        localStorage.setItem('decap-cms-user', JSON.stringify({
          token: qtoken,
          provider: 'github'
        }));
        history.replaceState(null, '', window.location.pathname);
        window.location.reload();
        return;
      }

      // Override window.open to redirect in same tab
      var originalOpen = window.open;
      window.open = function(url, name, features) {
        if (url && url.indexOf('api/auth') !== -1) {
          window.location.href = url;
          return window;
        }
        return originalOpen.call(window, url, name, features);
      };

      DecapCmsApp.init();
    </script>
  </body>
</html>
