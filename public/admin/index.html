<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager — farouqhassan.dev</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms-app@3.1.10/dist/decap-cms-app.js"></script>
    <script>
      // Read token from query string
      var urlParams = new URLSearchParams(window.location.search);
      var token = urlParams.get('token');

      if (token) {
        localStorage.setItem('decap-cms-user', JSON.stringify({
          token: token,
          provider: 'github'
        }));
        // Clean URL then reload so Decap picks up stored token
        history.replaceState(null, '', window.location.pathname);
        window.location.reload();
      } else {
        // Override window.open to redirect in same tab instead of popup
        var originalOpen = window.open;
        window.open = function(url, name, features) {
          if (url && url.indexOf('api/auth') !== -1) {
            window.location.href = url;
            return window;
          }
          return originalOpen.call(window, url, name, features);
        };

        DecapCmsApp.init();
      }
    </script>
  </body>
</html>
