<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager — farouqhassan.dev</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms-app@3.1.10/dist/decap-cms-app.js"></script>
    <script>
      // Strip leading # and any leading slash
      var hash = window.location.hash.replace(/^#\/?/, '');
      var params = {};
      hash.split('&').forEach(function(part) {
        var item = part.split('=');
        if (item[0]) params[decodeURIComponent(item[0])] = decodeURIComponent(item[1] || '');
      });

      if (params.access_token) {
        localStorage.setItem('decap-cms-user', JSON.stringify({
          token: params.access_token,
          provider: 'github'
        }));
        history.replaceState(null, '', window.location.pathname);
        // Reload so Decap picks up the stored token
        window.location.reload();
      }

      // Override window.open to redirect in same tab
      var originalOpen = window.open;
      window.open = function(url, name, features) {
        if (url && url.indexOf('api/auth') !== -1) {
          window.location.href = url;
          return window;
        }
        return originalOpen.call(window, url, name, features);
      };

      DecapCmsApp.init();
    </script>
  </body>
</html>
